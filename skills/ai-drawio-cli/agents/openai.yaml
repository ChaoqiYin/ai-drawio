interface:
  display_name: "AI Drawio CLI"
  short_description: "Use ai-drawio for executing draw.io and canvas tasks."
  default_prompt: "Use $ai-drawio-cli to execute draw.io or canvas tasks through ai-drawio. Do not execute any `ai-drawio` terminal command from this skill inside the default sandbox. Use `ai-drawio open` when the task is to launch the desktop app itself. For existing sessions, require the explicit session id as the positional target argument. If the user needs a new ready workspace, use `ai-drawio session create` and continue with the returned session id. Use `ai-drawio canvas document.preview <session-id>` for PNG preview export tasks. If the user asks to draw in draw.io, treat completion as running `ai-drawio canvas document.apply <session-id> <prompt>`, not merely generating a `.drawio` or XML file, unless the user explicitly asks for file-only output. After preparing XML, continue in the same run by executing `ai-drawio canvas document.apply` instead of stopping to suggest it as a next step. Always include the required prompt argument when running `ai-drawio canvas document.apply`, and do not switch to `--xml-file` unless the XML already exists on disk or the inline payload is too large for one safe command. Any temporary `.drawio` file must live under the system temp directory, never the project directory. If a command returns `APP_NOT_RUNNING`, or `ai-drawio status` reports `running: false`, run `ai-drawio open` outside the sandbox and then continue with the original task instead of asking the user to launch the app manually. When multiple ai-drawio commands are needed, run commands for different session IDs in parallel only when they do not target the same session, and never run two `ai-drawio` commands concurrently against the same session ID."

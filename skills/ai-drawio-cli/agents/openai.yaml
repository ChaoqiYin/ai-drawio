interface:
  display_name: "AI Drawio CLI"
  short_description: "Use ai-drawio for executing draw.io and canvas tasks."
  default_prompt: "Use $ai-drawio-cli to execute draw.io or canvas tasks through ai-drawio. Resolve the packaged `ai-drawio` executable as an absolute path before running commands, prefer `/Applications/AI Drawio.app/Contents/MacOS/ai-drawio` on macOS when it exists, and do not rely on PATH lookup or shell command discovery. Do not execute any `ai-drawio` terminal command from this skill inside the default sandbox. Launch the desktop app itself by executing the resolved packaged app path directly when needed. For existing sessions, require the explicit session id as the positional target argument. If the user needs a new ready workspace, use `ai-drawio session create` and continue with the returned session id. Do not prefer `ai-drawio session list` when another command already satisfies the task. Use `ai-drawio canvas document.preview <session-id>` for PNG preview export tasks. If the user asks for a live draw.io result, treat completion as running `ai-drawio canvas document.apply <session-id> <prompt>`, not merely generating a `.drawio` or XML file, unless the user explicitly asks for file-only output. Always include the required prompt argument when running `ai-drawio canvas document.apply`, and do not switch to `--xml-file` unless the XML already exists on disk or the inline payload is too large for one safe command. Any temporary `.drawio` file must live under the system temp directory, never the project directory. If a command returns `APP_NOT_RUNNING`, or `ai-drawio status` reports `running: false`, execute the resolved packaged app path directly outside the sandbox and then continue with the original task instead of asking the user to launch the app manually. Run commands for different session IDs in parallel only when they do not target the same session, and never run two `ai-drawio` commands concurrently against the same session ID. After a bounded task is fully complete, close the corresponding task session with `ai-drawio session close <session-id>` unless the user explicitly wants that session kept open."

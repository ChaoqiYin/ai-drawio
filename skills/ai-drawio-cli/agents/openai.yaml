interface:
  display_name: "AI Drawio CLI"
  short_description: "Use ai-drawio for executing draw.io and canvas tasks."
  default_prompt: "Use $ai-drawio-cli to execute draw.io or canvas tasks through ai-drawio. If the user asks to draw in draw.io, treat completion as running `ai-drawio canvas document.apply`, not merely generating a `.drawio` or XML file, unless the user explicitly asks for file-only output. After preparing XML, continue in the same run by executing `ai-drawio canvas document.apply` instead of stopping to suggest it as a next step. Always include the required prompt argument when running `ai-drawio canvas document.apply`, and do not switch to `--xml-file` unless the XML already exists on disk or the inline payload is too large for one safe command. Any temporary `.drawio` file must live under the system temp directory, never the project directory. Avoid non-required flags unless the user explicitly needs them."

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Drawio &#27491;&#22312;&#21551;&#21160;</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: Inter, "Segoe UI", sans-serif;
        background: #ffffff;
        color: #0f172a;
        border: 1px solid rgba(148, 163, 184, 0.24);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }

      body {
        display: grid;
        place-items: center;
        padding: 28px 24px;
        text-align: center;
      }

      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        max-width: 260px;
      }

      .spinner {
        width: 34px;
        height: 34px;
        margin: 0;
        border-radius: 999px;
        border: 3px solid rgba(59, 130, 246, 0.18);
        border-top-color: #3b82f6;
        animation: spin 0.9s linear infinite;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 600;
        line-height: 1.3;
      }

      p {
        margin: 0;
        font-size: 14px;
        line-height: 1.57;
        color: #475569;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner"></div>
      <h1>&#65;&#73; Drawio &#27491;&#22312;&#21551;&#21160;</h1>
      <p>&#27491;&#22312;&#20934;&#22791;&#24037;&#20316;&#21306;&#30028;&#38754;...</p>
    </main>
  </body>
</html>
